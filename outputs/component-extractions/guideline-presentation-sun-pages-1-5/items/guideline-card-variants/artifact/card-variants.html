<section class="sun-card-kit">
  <article class="sun-level-card" data-tone="blue">
    <p class="sun-card-kicker">{{level}}</p>
    <h3>{{title}}</h3>
    <div class="sun-card-icon">{{icon}}</div>
    <span class="sun-card-action" aria-hidden="true">↗</span>
  </article>

  <article class="sun-profile-card">
    <div class="sun-profile-icon">{{icon}}</div>
    <h3>{{title}}</h3>
    <p>{{description}}</p>
    <span class="sun-card-action" aria-hidden="true">↗</span>
  </article>

  <article class="sun-metric-banner" data-tone="orange">
    <h3>{{label}}</h3>
    <span class="sun-metric-arrow" aria-hidden="true">↗</span>
    <strong>{{value}}</strong>
    <span class="sun-card-action" aria-hidden="true">↗</span>
  </article>
</section>
