<section class="sun-shape-kit">
  <article class="sun-halo-node" data-tone="blue">
    <small>{{index}}</small>
    <strong>{{label}}</strong>
  </article>

  <div class="sun-formula">
    <article class="sun-hex-node" data-tone="orange">{{goal}}</article>
    <span>+</span>
    <article class="sun-hex-node" data-tone="orange">{{key_result}}</article>
    <span>×</span>
    <article class="sun-hex-node" data-tone="blue">{{task}}</article>
  </div>

  <div class="sun-overlap-nodes">
    <article>{{item_1}}</article>
    <article>{{item_2}}</article>
    <article>{{item_3}}</article>
  </div>
</section>
