<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Variations — Be Professional @ SUN.STUDIO</title>
  <link rel="stylesheet" href="variations.css">
  <style>
    html,body{margin:0;background:#1a1a1c;font-family:"Proxima Nova",system-ui,sans-serif;}
    .slide-host{position:relative;}
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="slides-data.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel">
    const { useEffect } = React;

    function Frame({ html, variant }) {
      return <div className={"vslide " + variant} dangerouslySetInnerHTML={{ __html: html }} />;
    }

    function App() {
      useEffect(() => {
        // build XO grids
        const xSvg = '<svg viewBox="0 0 100 100"><path d="M24 24L76 76M76 24L24 76" fill="none" stroke="currentColor" stroke-width="18" stroke-linecap="round"/></svg>';
        const oSvg = '<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="31" fill="none" stroke="currentColor" stroke-width="17" stroke-linecap="round"/></svg>';
        document.querySelectorAll('.xo-grid').forEach(grid => {
          if (grid.children.length) return;
          for (let row = 0; row < 8; row++) {
            const r = document.createElement('div');
            r.className = 'xo-row' + (row % 2 ? ' offset' : '');
            for (let col = 0; col < 13; col++) {
              const isX = col % 2 === 0;
              const hot = (row === 1 && col === 10) || (row === 4 && col === 7) || (row === 6 && col === 2);
              const c = document.createElement('span');
              c.className = 'xo-cell ' + (isX ? 'x' : 'o') + (hot ? ' hot' : '');
              c.innerHTML = isX ? xSvg : oSvg;
              r.appendChild(c);
            }
            grid.appendChild(r);
          }
        });
        // build barcodes
        document.querySelectorAll('[data-bc]').forEach(bc => {
          if (bc.children.length) return;
          let h = '';
          for (let i = 0; i < 22; i++) {
            const w = (Math.random() > .5 ? 4 : 2);
            const ht = 18 + Math.round(Math.random() * 26);
            h += `<i style="width:${w}px;height:${ht}px"></i>`;
          }
          bc.innerHTML = h;
        });
      }, []);

      const S = window.SLIDES;
      const AB = { width: 1920, height: 1080 };

      return (
        <DesignCanvas>
          <DCSection id="title" title="Slide 01 · Title" subtitle="Same hero — 3 background systems from the design system">
            <DCArtboard id="t-a" label="A · Warm paper + XO (brand-canonical)" {...AB}>
              <Frame html={S.TITLE_A} variant="" />
            </DCArtboard>
            <DCArtboard id="t-b" label="B · Orange full-bleed (energetic)" {...AB}>
              <Frame html={S.TITLE_B} variant="on-orange" />
            </DCArtboard>
            <DCArtboard id="t-c" label="C · Ink dark + orange glow (dramatic)" {...AB}>
              <Frame html={S.TITLE_C} variant="on-ink" />
            </DCArtboard>
          </DCSection>

          <DCSection id="agenda" title="Slide 02 · Agenda" subtitle="Ticket-stub system — 3 takes">
            <DCArtboard id="a-a" label="A · Horizontal ticket rows" {...AB}>
              <Frame html={S.AGENDA_A} variant="ag-a" />
            </DCArtboard>
            <DCArtboard id="a-b" label="B · Vertical ticket cards (3×2)" {...AB}>
              <Frame html={S.AGENDA_B} variant="ag-b" />
            </DCArtboard>
            <DCArtboard id="a-c" label="C · Boarding-pass strips" {...AB}>
              <Frame html={S.AGENDA_C} variant="ag-c" />
            </DCArtboard>
          </DCSection>

          <DCSection id="cards" title="Slide 03 · Meeting cards" subtitle="Refined gradients, white text — 3 takes">
            <DCArtboard id="c-a" label="A · Deepened multi-color gradients" {...AB}>
              <Frame html={S.CARDS_A} variant="cards-a" />
            </DCArtboard>
            <DCArtboard id="c-b" label="B · Unified orange family (boldest)" {...AB}>
              <Frame html={S.CARDS_B} variant="cards-b" />
            </DCArtboard>
            <DCArtboard id="c-c" label="C · Dark cards + color accent" {...AB}>
              <Frame html={S.CARDS_C} variant="cards-c" />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" fill="#FF5533"/>
      <text x="100" y="120" font-family="Arial" font-size="92" font-weight="900" fill="#fff" text-anchor="middle">@</text>
    </svg>
  </template>
</body>
</html>
