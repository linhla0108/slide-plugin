<article class="sun-metric-card">
  <svg class="sun-metric-card__shape" viewBox="0 0 290 418" preserveAspectRatio="none" aria-hidden="true">
    <!--
      Card shape path.
      - preserveAspectRatio="none" lets this curve stretch with --card-w / --card-h.
      - To make the lower-right notch deeper, move the middle control points left:
        255.6, 232.4, 217.1, 214.3.
      - To make the notch shallower, move those points closer to 290.
      - To make the notch start higher/lower, adjust V305.
      - To change the bottom exit length, adjust 178.2.
    -->
    <path fill="currentColor" d="M32 0H258C275.7 0 290 14.3 290 32V305C290 326.4 276.7 340.7 255.6 343.4C232.4 346.4 217.1 362.1 214.3 385.4C211.8 405.1 198.1 418 178.2 418H32C14.3 418 0 403.7 0 386V32C0 14.3 14.3 0 32 0Z"/>

  <div class="sun-metric-card__content">

  </div>

  <span class="sun-metric-card__arrow" aria-hidden="true">

      <path d="M18 46 46 18M24 18h22v22" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>

</article>
