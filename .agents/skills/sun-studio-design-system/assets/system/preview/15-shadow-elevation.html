<!doctype html><html><head><meta charset="utf-8"><title>Elevation</title><link rel="stylesheet" href="_card.css"><style></style></head><body>
<div class="card-label">Soft elevation</div>
<div class="row" style="padding:24px 4px 8px;">
  
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:140px; height:90px; background:white; border-radius:12px; box-shadow:0 4px 12px rgba(0,0,0,.04);"></div>
      <div style="font-size:10px; font-weight:800; letter-spacing:.06em; color:var(--muted); text-transform:uppercase;">sm</div>
    </div>
  
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:140px; height:90px; background:white; border-radius:12px; box-shadow:0 10px 26px rgba(0,0,0,.06);"></div>
      <div style="font-size:10px; font-weight:800; letter-spacing:.06em; color:var(--muted); text-transform:uppercase;">md</div>
    </div>
  
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:140px; height:90px; background:white; border-radius:12px; box-shadow:0 18px 46px rgba(0,0,0,.10);"></div>
      <div style="font-size:10px; font-weight:800; letter-spacing:.06em; color:var(--muted); text-transform:uppercase;">lg</div>
    </div>
  
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:140px; height:90px; background:white; border-radius:12px; box-shadow:0 24px 80px rgba(0,0,0,.35);"></div>
      <div style="font-size:10px; font-weight:800; letter-spacing:.06em; color:var(--muted); text-transform:uppercase;">xl</div>
    </div>
  
</div>
</body></html>
