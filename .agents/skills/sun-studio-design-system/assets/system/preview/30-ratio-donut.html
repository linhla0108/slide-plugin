<!-- @dsCard group="Components" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Ratio + Donut</title>
<link rel="stylesheet" href="_card.css">
<link rel="stylesheet" href="../components/ratio-donut.css">
<style>
  .brief { font-size: 12px; line-height: 1.4; font-weight: 500; color: var(--muted); margin: -4px 0 2px; }
  .brief b { color: var(--ink); font-weight: 700; }
  .vlabel { font-size: 10px; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; color: var(--muted-2); margin-top: 10px; }
</style>
</head>
<body>
<div class="card-label">Ratio split + Donut</div>
<p class="brief">Weighted parts as a bar or a ring. <b>Deck-02/05</b> WHAT/HOW &amp; cơ cấu mục tiêu.</p>

<div class="ratio-split" style="--cs:.66; --w-a:80; --w-b:20">
  <div class="seg a" style="flex:80"><span class="pct">80%</span><span class="lbl">What</span></div>
  <div class="seg b" style="flex:20"><span class="pct">20%</span><span class="lbl">How</span></div>
</div>

<div class="vlabel">Donut · cơ cấu mục tiêu nhân viên</div>
<div class="donut-row" style="--cs:.62">
  <div class="donut" style="--cs:.62; --p:90; --c:var(--sun-orange)">
    <div class="val">90%</div>
    <div class="cap">Vận hành</div>
  </div>
  <div class="donut-legend" style="--cs:.62">
    <div class="li"><span class="dot" style="background:var(--sun-orange)"></span><span class="k"><b>90%</b> Vận hành + Dự án</span></div>
    <div class="li"><span class="dot" style="background:var(--soft);border:1px solid var(--line)"></span><span class="k"><b>10%</b> Phát triển năng lực</span></div>
  </div>
</div>
</body>
</html>
