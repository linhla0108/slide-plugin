<!-- @dsCard group="Components" -->
<!doctype html><html><head><meta charset="utf-8"><title>Numbered</title><link rel="stylesheet" href="_card.css"><style></style></head><body>
<div class="card-label">Numbered circles & step badges</div>
<div class="row" style="align-items:center;">
  
    <div style="width:32px; height:32px; border-radius:50%; background:#FF5533; color:#fff; display:grid; place-items:center; font-size:13.333333333333334px; font-weight:900; box-shadow:0 4px 10.666666666666666px rgba(255,85,51,.22);">01</div>
  
    <div style="width:44px; height:44px; border-radius:50%; background:#FF5533; color:#fff; display:grid; place-items:center; font-size:18.333333333333336px; font-weight:900; box-shadow:0 5.5px 14.666666666666666px rgba(255,85,51,.22);">02</div>
  
    <div style="width:62px; height:62px; border-radius:50%; background:#3333FF; color:#fff; display:grid; place-items:center; font-size:25.833333333333336px; font-weight:900; box-shadow:0 7.75px 20.666666666666668px rgba(51,51,255,.22);">03</div>
  
    <div style="width:70px; height:70px; border-radius:50%; background:#FF5533; color:#fff; display:grid; place-items:center; font-size:29.166666666666668px; font-weight:900; box-shadow:0 8.75px 23.333333333333332px rgba(255,85,51,.22);">04</div>
  
  <div style="display:inline-block; width:34px; height:34px; border-radius:10px; background:#FF5533; color:#fff; display:grid; place-items:center; font-size:16px; font-weight:900;">5</div>
</div>
<div style="font-size:11px; color:var(--muted); font-weight:600;">Blue is secondary / passive steps. Orange is the focus step. Squared 34px badge is for inline action-item lists.</div>
</body></html>
