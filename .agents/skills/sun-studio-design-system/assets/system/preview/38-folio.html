<!-- @dsCard group="Components" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Folio / footer chrome</title>
<link rel="stylesheet" href="_card.css">
<link rel="stylesheet" href="../components/folio.css">
<style>
  .brief { font-size: 12px; line-height: 1.4; font-weight: 500; color: var(--muted); margin: -4px 0 2px; }
  .brief b { color: var(--ink); font-weight: 700; }
  .vlabel { font-size: 10px; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; color: var(--muted-2); margin-top: 12px; }
  .demo-bar { border: 1px dashed var(--line); border-radius: var(--r-sm); padding: 12px 16px; }
  .demo-ink { background: var(--ink); border-radius: var(--r-sm); padding: 12px 16px; }
  .tagrow { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
</style>
</head>
<body>
<div class="card-label">Folio / footer chrome</div>
<p class="brief">The persistent slide chrome — copyright + deck tag + page number. <b>Every deck</b>.</p>

<div class="demo-bar">
  <div class="folio" style="--cs:.84">
    <span class="copy">©2026 SUN.STUDIO ALL RIGHTS RESERVED</span>
    <span class="deck-tag">Goal Setting 2026</span>
    <span class="pageno">04</span>
  </div>
</div>

<div class="vlabel">On ink</div>
<div class="demo-ink">
  <div class="folio on-ink" style="--cs:.84">
    <span class="copy">©2026 SUN.STUDIO ALL RIGHTS RESERVED</span>
    <span class="pageno">12</span>
  </div>
</div>

<div class="vlabel">Cover dept tag · page pill</div>
<div class="tagrow">
  <span class="dept-tag" style="--cs:.8"><span class="dept">HR &amp; Admin Dept</span><span class="year">2026</span></span>
  <span class="page-pill" style="--cs:.8">25</span>
</div>
</body>
</html>
