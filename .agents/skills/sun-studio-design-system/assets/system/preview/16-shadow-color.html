<!doctype html><html><head><meta charset="utf-8"><title>Color halos</title><link rel="stylesheet" href="_card.css"><style></style></head><body>
<div class="card-label">Coloured halos & poster offset</div>
<div class="row" style="padding:24px 4px 8px;">
  <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
    <div style="width:140px; height:90px; background:#FF5533; border-radius:12px; box-shadow:0 14px 38px rgba(255,85,51,.32);"></div>
    <div style="font-size:10px; font-weight:800; color:var(--muted); text-transform:uppercase;">orange halo</div>
  </div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
    <div style="width:140px; height:90px; background:#3333FF; border-radius:12px; box-shadow:0 12px 34px rgba(51,51,255,.32);"></div>
    <div style="font-size:10px; font-weight:800; color:var(--muted); text-transform:uppercase;">blue halo</div>
  </div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
    <div style="width:140px; height:90px; background:#FF5533; border-radius:0 18px 18px 0; box-shadow:10px 10px 0 rgba(255,85,51,.18);"></div>
    <div style="font-size:10px; font-weight:800; color:var(--muted); text-transform:uppercase;">poster offset</div>
  </div>
</div>
</body></html>
