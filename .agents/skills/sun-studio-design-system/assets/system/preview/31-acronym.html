<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Acronym framework</title>
<link rel="stylesheet" href="_card.css">
<link rel="stylesheet" href="../components/acronym.css">
<style>
  .brief { font-size: 12px; line-height: 1.4; font-weight: 500; color: var(--muted); margin: -4px 0 2px; }
  .brief b { color: var(--ink); font-weight: 700; }
  .vlabel { font-size: 10px; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; color: var(--muted-2); margin-top: 8px; }
</style>
</head>
<body>
<div class="card-label">Acronym framework</div>
<p class="brief">Letter-by-letter breakdown. <b>Deck-03/05</b> SMART key results.</p>

<div class="acronym" style="--cs:.6">
  <div class="acro-row"><div class="letter">S</div><div class="word">Specific<span class="sub">Cụ thể — rõ mục tiêu muốn đạt</span></div></div>
  <div class="acro-row"><div class="letter">M</div><div class="word">Measurable<span class="sub">Đo lường — có chỉ số rõ ràng</span></div></div>
  <div class="acro-row"><div class="letter">A</div><div class="word">Attainable<span class="sub">Khả thi — trong tầm với</span></div></div>
</div>

<div class="vlabel">Compact strip variant</div>
<div class="acro-strip" style="--cs:.7">
  <div class="cell"><span class="letter">R</span><span class="word">Relevant</span><span class="sub">Liên quan</span></div>
  <div class="cell"><span class="letter">T</span><span class="word">Time-bound</span><span class="sub">Có thời hạn</span></div>
</div>
</body>
</html>
