<div class="vlabel">Blue · process variant</div>
<div class="chevron-flow blue" style="--cs:.52">

  <div class="chev"><span class="n">B2</span><span class="t">Duyệt</span></div>
  <div class="chev"><span class="n">B3</span><span class="t">Phản hồi</span></div>
