<!doctype html><html><head><meta charset="utf-8"><title>XO pattern</title><link rel="stylesheet" href="_card.css"><style></style></head><body>
<div class="card-label">XO pattern · the signature backdrop</div>
<div style="position:relative; width:100%; height:240px; background:#FFFDF8; border-radius:12px; overflow:hidden; border:1px solid var(--line);">
  <div id="g" style="position:absolute; inset:-60px -40px; display:grid; grid-auto-rows:54px; gap:6px; transform:rotate(-24deg) scale(1.06); transform-origin:50% 50%;"></div>
  <div style="position:absolute; inset:0; background:radial-gradient(circle at 78% 18%, rgba(255,85,51,.18), transparent 24%), linear-gradient(90deg,#FFFDF8 0%,rgba(255,253,248,.72) 40%,rgba(255,253,248,.44) 68%,rgba(255,253,248,.10) 100%); pointer-events:none;"></div>
</div>
<script>
  (function(){
    const x = '<svg viewBox="0 0 100 100" width="26" height="26"><path d="M24 24L76 76M76 24L24 76" fill="none" stroke="currentColor" stroke-width="18" stroke-linecap="round"/></svg>';
    const o = '<svg viewBox="0 0 100 100" width="26" height="26"><circle cx="50" cy="50" r="31" fill="none" stroke="currentColor" stroke-width="17" stroke-linecap="round"/></svg>';
    const g = document.getElementById('g');
    for (let r=0; r<6; r++) {
      const row = document.createElement('div');
      row.style.cssText = 'display:grid; grid-template-columns:repeat(13,54px); gap:8px;' + (r%2?'transform:translateX(60px);':'');
      for (let c=0; c<13; c++) {
        const cell = document.createElement('span');
        const isX = c%2===0;
        const hot = (r===1 && c===10) || (r===4 && c===3);
        cell.style.cssText = 'display:grid; place-items:center; opacity:' + (hot?'.85':'.18') + '; color:' + (isX?'#FF5533':'#000') + ';' + (hot?'transform:scale(1.5);':'');
        cell.innerHTML = isX ? x : o;
        row.appendChild(cell);
      }
      g.appendChild(row);
    }
  })();
</script>
</body></html>
