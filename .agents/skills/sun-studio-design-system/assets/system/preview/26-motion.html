<!doctype html><html><head><meta charset="utf-8"><title>Motion</title><link rel="stylesheet" href="_card.css"><style></style></head><body>

<div style="display:flex; flex-direction:column; gap:10px;">

  <div class="token-row"><span class="k">slideRight</span><span class="v">translateX(-54px) + opacity 0 → 0 · 720ms</span></div>
  <div class="token-row"><span class="k">stagger</span><span class="v">80–120ms between items</span></div>
</div>
</body></html>
