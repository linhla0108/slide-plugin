<!-- @dsCard group="Components" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Cards</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    align-items: stretch;
  }
  .ds-card {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 20px;
    border-radius: var(--r-lg);
    background: var(--paper);
  }
  .ds-card .eyebrow-mono {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .ds-card .title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: var(--fw-black);
    line-height: 1.05;
    letter-spacing: -.01em;
    text-transform: uppercase;
  }
  .ds-card .desc {
    font-size: 13px;
    line-height: 1.4;
    font-weight: 500;
    color: var(--muted);
    margin-top: 2px;
  }

  /* 1 · Neutral — hairline + soft elevation */
  .ds-card.neutral {
    border: 1px solid var(--line);
    box-shadow: var(--shadow-sm);
  }

  /* 2 · Soft tint — flat orange wash, no gradient */
  .ds-card.tint {
    background: var(--sun-orange-soft);
    border: 1px solid var(--sun-orange-25);
  }
  .ds-card.tint .eyebrow-mono { color: var(--sun-orange-dark); }
  .ds-card.tint .desc { color: var(--ink-soft); }

  /* 3 · Press — signature offset orange block shadow */
  .ds-card.press {
    border: 3px solid var(--ink);
    border-radius: var(--r-md);
    box-shadow: var(--shadow-press-orange);
  }
  .ds-card.press .eyebrow-mono { color: var(--sun-orange); }
  .ds-card.press .title { color: var(--ink); }

  /* 4 · Ink — quietly emphatic dark surface */
  .ds-card.ink {
    background: var(--ink);
    color: var(--sun-white);
  }
  .ds-card.ink .eyebrow-mono { color: var(--sun-orange); }
  .ds-card.ink .title { color: var(--sun-white); }
  .ds-card.ink .desc { color: rgba(255,255,255,.72); }
</style>
</head>
<body>
<div class="card-label">Card styles</div>
<div class="card-grid">

  <div class="ds-card neutral">
    <div class="eyebrow-mono">Neutral</div>
    <div class="title">Default card</div>
    <div class="desc">Hairline border · 18px radius · soft sm shadow.</div>
  </div>

  <div class="ds-card tint">
    <div class="eyebrow-mono">Tint</div>
    <div class="title">Soft card</div>
    <div class="desc">Flat orange wash on a warm border — no gradient.</div>
  </div>

  <div class="ds-card press">
    <div class="eyebrow-mono">Focus</div>
    <div class="title">Press card</div>
    <div class="desc">3px ink edge + the signature offset orange block.</div>
  </div>

  <div class="ds-card ink">
    <div class="eyebrow-mono">Primary</div>
    <div class="title">Ink card</div>
    <div class="desc">Dark surface, orange accent. Quietly emphatic.</div>
  </div>

</div>
</body>
</html>
