<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SUN.RISER 2026 — Interview Workshop</title>
<style>
  :root {
    --sun-orange: #FF5533;
    --sun-blue: #3333FF;
    --ink: #141414;
    --paper: #FFFDF8;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #0c0c0c;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: #fff;
  }
  #stage-wrap {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  #frame-host {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 1920px;
    height: 1080px;
    background: var(--paper);
    transform-origin: center center;
    transform: translate(-50%, -50%) scale(1);
    box-shadow: 0 24px 80px rgba(0,0,0,.45);
    overflow: hidden;
  }
  #frame-host iframe {
    position: absolute;
    inset: 0;
    width: 1920px;
    height: 1080px;
    border: 0;
    display: block;
  }

  /* Chrome */
  .chrome {
    position: fixed;
    z-index: 50;
    pointer-events: none;
    user-select: none;
  }
  .chrome > * { pointer-events: auto; }

  .nav-btn {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    z-index: 60;
    width: 56px;
    height: 56px;
    border-radius: 999px;
    border: 0;
    background: rgba(255,255,255,.10);
    color: #fff;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    font-size: 24px;
    font-weight: 700;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: background .15s ease, transform .15s ease;
  }
  .nav-btn:hover { background: var(--sun-orange); transform: translateY(-50%) scale(1.04); }
  .nav-btn:disabled { opacity: .3; cursor: not-allowed; }
  .nav-btn:disabled:hover { background: rgba(255,255,255,.10); transform: translateY(-50%); }
  #prev { left: 18px; }
  #next { right: 18px; }
  .nav-btn svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }

  #counter {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 60;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 18px;
    background: rgba(255,255,255,.10);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    font-variant-numeric: tabular-nums;
  }
  #counter .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,.35);
    transition: background .2s, transform .2s;
    cursor: pointer;
  }
  #counter .dot.active { background: var(--sun-orange); transform: scale(1.6); }
  #counter .label { opacity: .85; min-width: 48px; text-align: center; }

  #title-tag {
    position: fixed;
    top: 18px;
    left: 18px;
    z-index: 60;
    padding: 8px 14px;
    background: rgba(255,255,255,.10);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    opacity: .92;
  }
  #title-tag .sep { opacity: .4; margin: 0 8px; }
  #title-tag .name { color: var(--sun-orange); }

  /* Hide chrome briefly when idle */
  body.idle .nav-btn,
  body.idle #counter,
  body.idle #title-tag { opacity: 0; transition: opacity .4s ease; }
  .nav-btn, #counter, #title-tag { transition: opacity .25s ease, background .15s ease, transform .15s ease; }

  @media print {
    html, body { background: #fff; overflow: visible; }
    #stage-wrap { position: relative; }
    .chrome, .nav-btn, #counter, #title-tag { display: none; }
  }
</style>
</head>
<body>
  <div id="title-tag">
    <span class="name">SUN.RISER 2026</span>
    <span class="sep">/</span>
    <span id="slide-title">Title</span>
  </div>

  <div id="stage-wrap">
    <div id="frame-host">
      <iframe id="frame" title="Slide" scrolling="no"></iframe>
    </div>
  </div>

  <button class="nav-btn" id="prev" aria-label="Previous slide">
    <svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"></polyline></svg>
  </button>
  <button class="nav-btn" id="next" aria-label="Next slide">
    <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"></polyline></svg>
  </button>

  <div id="counter">
    <span class="label" id="counter-label">01 / 12</span>
    <span id="dots" style="display:flex; gap:7px;"></span>
  </div>

  <script>
    const slides = [
      { file: '01-title.html',                 title: 'Title' },
      { file: '02-timeline.html',              title: 'Timeline' },
      { file: '03-objectives.html',            title: 'Objectives' },
      { file: '04-mindset.html',               title: 'Mindset' },
      { file: '05-cv-battle.html',             title: 'CV Battle' },
      { file: '06-prep-1.html',                title: 'Prep · JD' },
      { file: '07-prep-2.html',                title: 'Prep · CV' },
      { file: '08-structure.html',             title: '6-step Structure' },
      { file: '09-starr.html',                 title: 'STARR' },
      { file: '10-difficult-candidates.html',  title: 'Difficult Candidates' },
      { file: '11-do-dont.html',               title: 'Do & Don\u2019t' },
      { file: '12-thank-you.html',             title: 'Thank You' },
    ];

    const frame = document.getElementById('frame');
    const frameHost = document.getElementById('frame-host');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const counterLabel = document.getElementById('counter-label');
    const slideTitle = document.getElementById('slide-title');
    const dotsEl = document.getElementById('dots');

    // Build dots
    slides.forEach((s, i) => {
      const d = document.createElement('span');
      d.className = 'dot';
      d.title = `${String(i+1).padStart(2,'0')} — ${s.title}`;
      d.addEventListener('click', () => goTo(i));
      dotsEl.appendChild(d);
    });

    function parseIndex() {
      const h = (location.hash || '').replace('#', '');
      const n = parseInt(h, 10);
      if (Number.isFinite(n) && n >= 1 && n <= slides.length) return n - 1;
      return 0;
    }

    let current = parseIndex();

    function render() {
      const s = slides[current];
      // Use ?nochrome=1 hint in case slides ever check it; harmless if ignored.
      const url = s.file;
      if (frame.getAttribute('data-current') !== url) {
        frame.setAttribute('data-current', url);
        frame.src = url;
      }
      counterLabel.textContent = `${String(current+1).padStart(2,'0')} / ${String(slides.length).padStart(2,'0')}`;
      slideTitle.textContent = s.title;
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === slides.length - 1;
      [...dotsEl.children].forEach((d, i) => d.classList.toggle('active', i === current));
      const newHash = `#${current + 1}`;
      if (location.hash !== newHash) history.replaceState(null, '', newHash);
    }

    function goTo(i) {
      const next = Math.max(0, Math.min(slides.length - 1, i));
      if (next === current) return;
      current = next;
      render();
    }
    function nextSlide() { goTo(current + 1); }
    function prevSlide() { goTo(current - 1); }

    prevBtn.addEventListener('click', prevSlide);
    nextBtn.addEventListener('click', nextSlide);

    document.addEventListener('keydown', (e) => {
      if (e.target && /input|textarea|select/i.test(e.target.tagName)) return;
      switch (e.key) {
        case 'ArrowRight':
        case 'PageDown':
        case ' ':
          e.preventDefault(); nextSlide(); break;
        case 'ArrowLeft':
        case 'PageUp':
          e.preventDefault(); prevSlide(); break;
        case 'Home':
          e.preventDefault(); goTo(0); break;
        case 'End':
          e.preventDefault(); goTo(slides.length - 1); break;
      }
    });

    window.addEventListener('hashchange', () => {
      const i = parseIndex();
      if (i !== current) { current = i; render(); }
    });

    // Scale 1920×1080 stage to viewport
    function fit() {
      const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      frameHost.style.transform = `translate(-50%, -50%) scale(${scale})`;
    }
    window.addEventListener('resize', fit);
    fit();

    // Idle chrome fade
    let idleTimer;
    function bumpIdle() {
      document.body.classList.remove('idle');
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => document.body.classList.add('idle'), 2600);
    }
    ['mousemove','keydown','click','touchstart'].forEach(ev =>
      window.addEventListener(ev, bumpIdle, { passive: true }));
    bumpIdle();

    // Forward keyboard from inside iframe (best-effort — same-origin slides)
    frame.addEventListener('load', () => {
      try {
        const doc = frame.contentDocument;
        if (!doc) return;
        doc.addEventListener('keydown', (e) => {
          if (['ArrowRight','ArrowLeft','PageDown','PageUp',' ','Home','End'].includes(e.key)) {
            // re-dispatch on parent
            document.dispatchEvent(new KeyboardEvent('keydown', { key: e.key }));
          }
        });
      } catch (_) { /* cross-origin: ignore */ }
    });

    render();
  </script>
</body>
</html>
