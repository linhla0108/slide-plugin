<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Slide 1: Title — XO Pattern Sample</title>
  <style>
    @font-face {
      font-family: "Proxima Nova";
      src: url("../fonts/Proxima-Nova-Regular.otf") format("opentype");
      font-weight: 400;
    }

    @font-face {
      font-family: "Proxima Nova";
      src: url("../fonts/Proxima-Nova-SemiBold.otf") format("opentype");
      font-weight: 600;
    }

    @font-face {
      font-family: "Proxima Nova";
      src: url("../fonts/Proxima-Nova-Bold.otf") format("opentype");
      font-weight: 700;
    }

    @font-face {
      font-family: "Proxima Nova";
      src: url("../fonts/Proxima-Black.otf") format("opentype");
      font-weight: 900;
    }

    :root {
      --sun-orange: #FF5533;
      --sun-blue: #3333FF;
      --ink: #141414;
      --muted: #5f5f5f;
      --paper: #FFFDF8;
      --font-display: "Proxima Nova", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-body: "Proxima Nova", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      isolation: isolate;
      background: #111;
      font-family: var(--font-body);
      color: var(--ink);
    }

    body {
      display: grid;
      place-items: center;
    }

    #stage {
      width: 1920px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      isolation: isolate;
      background: var(--paper);
      transform-origin: center center;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .35);
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      isolation: isolate;
      background: var(--paper);
      padding: 74px 92px 68px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      isolation: isolate;
    }

    .xo-pattern {
      position: absolute;
      inset: 0;
      z-index: 0;
      opacity: .92;
      pointer-events: none;
    }

    .xo-grid {
      position: absolute;
      inset: -170px -150px;
      display: grid;
      grid-template-columns: 1fr;
      grid-auto-rows: 190px;
      gap: 18px;
      transform: rotate(-24deg) scale(1.06);
      transform-origin: 50% 50%;
    }

    .xo-row {
      display: grid;
      grid-template-columns: repeat(13, 190px);
      gap: 22px;
    }

    .xo-row.offset {
      transform: translateX(212px);
    }

    .xo-cell {
      display: grid;
      place-items: center;
      opacity: .16;
    }

    .xo-cell svg {
      width: 86px;
      height: 86px;
      display: block;
      overflow: visible;
      filter: drop-shadow(16px 20px 0 rgba(24, 24, 27, .18));
    }

    .xo-cell.x {
      color: var(--sun-orange);
      opacity: .25;
      transform: translateY(-3px);
    }

    .xo-cell.x svg {
      filter: drop-shadow(16px 20px 0 rgba(255, 85, 51, .26));
    }

    .xo-cell.o {
      color: #000;
      opacity: .15;
      transform: translateY(3px);
    }

    .xo-cell.o svg {
      filter: drop-shadow(16px 20px 0 rgba(0, 0, 0, .22));
    }

    .xo-cell.hot {
      opacity: .82;
    }

    .xo-cell.hot svg {
      width: 116px;
      height: 116px;
    }

    .xo-cell.hot.x svg {
      filter: drop-shadow(22px 28px 0 rgba(255, 85, 51, .34));
    }

    .xo-cell.hot.o svg {
      filter: drop-shadow(22px 28px 0 rgba(0, 0, 0, .30));
    }

    .wash {
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(circle at 78% 18%, rgba(255, 85, 51, .18), transparent 24%),
        linear-gradient(90deg, var(--paper) 0%, rgba(255, 253, 248, .72) 40%, rgba(255, 253, 248, .44) 68%, rgba(255, 253, 248, .10) 100%);
      pointer-events: none;
    }

    .top,
    .hero,
    .bottom {
      position: relative;
      z-index: 2;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      opacity: 0;
      animation: fadeDown .62s cubic-bezier(.2, .8, .2, 1) .05s both;
    }

    .logo img {
      width: 176px;
      height: auto;
      display: block;
    }

    .pills {
      display: flex;
      gap: 16px;
    }

    .pill {
      padding: 14px 20px 12px;
      border: 3px solid var(--sun-orange);
      border-radius: 999px;
      color: var(--sun-orange);
      background: rgba(255, 255, 255, .74);
      font-size: 18px;
      font-weight: 900;
      letter-spacing: .09em;
      text-transform: uppercase;
    }

    .hero {
      align-self: center;
      display: block;
      margin-top: 10px;
    }

    .eyebrow {
      width: max-content;
      margin-bottom: 28px;
      padding: 14px 20px 12px;
      background: var(--ink);
      color: #fff;
      border-radius: 18px;
      font-size: 25px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
      opacity: 0;
      animation: slideRight .72s cubic-bezier(.2, .8, .2, 1) .12s both;
    }

    h1 {
      margin: 0;
      max-width: 1120px;
      font-family: var(--font-display);
      font-size: 136px;
      line-height: .88;
      font-weight: 900;
      letter-spacing: -.025em;
      text-transform: uppercase;
      text-wrap: balance;
    }

    h1 span {
      display: block;
      opacity: 0;
      animation: slideRight .72s cubic-bezier(.2, .8, .2, 1) both;
    }

    h1 span:nth-child(1) {
      animation-delay: .20s;
    }

    h1 span:nth-child(2) {
      animation-delay: .31s;
    }

    h1 .orange {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 28px 18px;
      border-radius: 0 30px 30px 0;
      background: var(--sun-orange);
      color: #fff;
      box-shadow: 18px 18px 0 rgba(255, 85, 51, .18);
      animation-delay: .42s;
    }

    .subcopy {
      display: none;
    }

    .bottom {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 48px;
      font-size: 30px;
      line-height: 1.18;
      font-weight: 850;
      color: var(--ink);
      opacity: 0;
      animation: fadeUp .68s cubic-bezier(.2, .8, .2, 1) .68s both;
    }

    .bottom strong {
      color: var(--ink);
      font-weight: 900;
    }

    .bottom-message {
      max-width: 1040px;
    }

    .tag {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .slide-number {
      position: absolute;
      right: 60px;
      bottom: 54px;
      font-size: 20px;
      font-weight: 700;
      color: rgba(20, 20, 20, .45);
      pointer-events: none;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(34px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideRight {
      from {
        opacity: 0;
        transform: translateX(-54px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @media print {

      html,
      body {
        background: white;
        display: block;
        overflow: visible;
      }

      #stage {
        transform: none !important;
        box-shadow: none;
      }

      .slide {
        position: relative;
        page-break-after: always;
      }
    }
  </style>
</head>

<body>
  <main id="stage">
    <section class="slide" data-screen-label="01 Title XO Pattern">
      <div class="xo-pattern" aria-hidden="true">
        <div class="xo-grid" id="xoGrid"></div>
      </div>
      <div class="wash" aria-hidden="true"></div>

      <div class="top">
        <div class="logo"><img src="../assets/logo.png" alt="SUN.STUDIO"></div>
        <div class="pills">
          <div class="pill">Workshop nội bộ</div>
          <div class="pill">Tháng 5/2026</div>
        </div>
      </div>

      <div class="hero">
        <div>
          <div class="eyebrow">SUN.RISER 2026</div>
          <h1>
            <span>Interview</span>
            <span>Workshop</span>
            <span class="orange">SUN.RISER 2026</span>
          </h1>
        </div>

      </div>

      <div class="bottom">
        <div class="bottom-message"><strong>Trang bị kỹ năng phỏng vấn cho Hiring Managers </strong> <br> Tìm đúng
          người,
          đúng thời điểm.</div>
        <div class="tag">SUN RISES. GAME ON.</div>
      </div>

      <div class="slide-number">#1</div>
    </section>
  </main>

  <script>
    const xSvg = '<svg viewBox="0 0 100 100" aria-hidden="true"><path d="M24 24L76 76M76 24L24 76" fill="none" stroke="currentColor" stroke-width="18" stroke-linecap="round" /></svg>';
    const oSvg = '<svg viewBox="0 0 100 100" aria-hidden="true"><circle cx="50" cy="50" r="31" fill="none" stroke="currentColor" stroke-width="17" stroke-linecap="round" /></svg>';
    const grid = document.getElementById('xoGrid');

    for (let row = 0; row < 8; row += 1) {
      const rowEl = document.createElement('div');
      rowEl.className = `xo-row${row % 2 ? ' offset' : ''}`;

      for (let col = 0; col < 13; col += 1) {
        const isX = col % 2 === 0;
        const cell = document.createElement('span');
        const hot = (row === 1 && col === 10) || (row === 4 && col === 7) || (row === 6 && col === 2);
        cell.className = `xo-cell ${isX ? 'x' : 'o'}${hot ? ' hot' : ''}`;
        cell.innerHTML = isX ? xSvg : oSvg;
        rowEl.appendChild(cell);
      }

      grid.appendChild(rowEl);
    }

    const stage = document.getElementById('stage');
    function fit() {
      const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      stage.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', fit);
    fit();
  </script>
</body>

</html>
