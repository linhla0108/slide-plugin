<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SUN.RISER 2026 — v2 demo</title>
<style>
  :root {
    --sun-orange: #FF5533;
    --paper: #F1ECDE;
    --ink: #141312;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; width: 100%; height: 100%;
    background: #0c0c0c; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: #fff;
  }
  #stage-wrap { position: absolute; inset: 0; overflow: hidden; }
  #frame-host {
    position: absolute; top: 50%; left: 50%;
    width: 1920px; height: 1080px;
    transform-origin: center center;
    transform: translate(-50%, -50%) scale(1);
    background: var(--paper);
    box-shadow: 0 24px 80px rgba(0,0,0,.45);
    overflow: hidden;
  }
  #frame { position: absolute; inset: 0; width: 1920px; height: 1080px; border: 0; display: block; }

  .nav-btn {
    position: fixed; top: 50%; transform: translateY(-50%);
    z-index: 60; width: 52px; height: 52px;
    border-radius: 999px; border: 0;
    background: rgba(255,255,255,.10); color: #fff;
    backdrop-filter: blur(8px);
    cursor: pointer; display: grid; place-items: center;
    transition: background .15s, transform .15s;
  }
  .nav-btn:hover { background: var(--sun-orange); transform: translateY(-50%) scale(1.05); }
  .nav-btn:disabled { opacity: .3; cursor: not-allowed; }
  #prev { left: 18px; }
  #next { right: 18px; }
  .nav-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2.4; stroke-linecap: round; }

  #counter {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    z-index: 60; display: flex; align-items: center; gap: 14px;
    padding: 9px 18px; background: rgba(255,255,255,.10);
    backdrop-filter: blur(8px); border-radius: 999px;
    font-size: 12px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase;
    font-variant-numeric: tabular-nums;
  }
  #counter .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.35); cursor: pointer; transition: .2s; }
  #counter .dot.active { background: var(--sun-orange); transform: scale(1.6); }

  #title-tag {
    position: fixed; top: 18px; left: 18px; z-index: 60;
    padding: 8px 14px; background: rgba(255,255,255,.10);
    backdrop-filter: blur(8px); border-radius: 999px;
    font-size: 11px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase;
  }
  #title-tag .name { color: var(--sun-orange); }
  #title-tag .sep { opacity: .4; margin: 0 8px; }

  #compare {
    position: fixed; top: 18px; right: 18px; z-index: 60;
    padding: 8px 14px; background: rgba(255,255,255,.10);
    backdrop-filter: blur(8px); border-radius: 999px;
    font-size: 11px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase;
    color: #fff; text-decoration: none;
    transition: background .15s;
  }
  #compare:hover { background: var(--sun-orange); }

  body.idle .nav-btn, body.idle #counter, body.idle #title-tag, body.idle #compare { opacity: 0; }
  .nav-btn, #counter, #title-tag, #compare { transition: opacity .25s, background .15s, transform .15s; }
</style>
</head>
<body>
  <div id="title-tag">
    <span class="name">SUN.RISER 2026 · v2 demo</span>
    <span class="sep">/</span>
    <span id="slide-title">Title</span>
  </div>

  <a id="compare" href="../slides/index.html">← bản gốc</a>

  <div id="stage-wrap">
    <div id="frame-host">
      <iframe id="frame" title="Slide" scrolling="no"></iframe>
    </div>
  </div>

  <button class="nav-btn" id="prev" aria-label="Previous">
    <svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"></polyline></svg>
  </button>
  <button class="nav-btn" id="next" aria-label="Next">
    <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"></polyline></svg>
  </button>

  <div id="counter">
    <span id="counter-label">01 / 03</span>
    <span id="dots" style="display:flex; gap:7px;"></span>
  </div>

  <script>
    const slides = [
      { file: '01-title.html',      title: 'Title — editorial poster' },
      { file: '03-objectives.html', title: 'Objectives — 4 lát điển hình' },
      { file: '12-thank-you.html',  title: 'Closing — ink slab + DIO' },
    ];

    const frame = document.getElementById('frame');
    const frameHost = document.getElementById('frame-host');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const counterLabel = document.getElementById('counter-label');
    const slideTitle = document.getElementById('slide-title');
    const dotsEl = document.getElementById('dots');

    slides.forEach((s, i) => {
      const d = document.createElement('span');
      d.className = 'dot'; d.title = s.title;
      d.addEventListener('click', () => goTo(i));
      dotsEl.appendChild(d);
    });

    function parseIndex() {
      const n = parseInt((location.hash || '').replace('#',''), 10);
      return Number.isFinite(n) && n >= 1 && n <= slides.length ? n - 1 : 0;
    }
    let current = parseIndex();

    function render() {
      const s = slides[current];
      if (frame.getAttribute('data-current') !== s.file) {
        frame.setAttribute('data-current', s.file);
        frame.src = s.file;
      }
      counterLabel.textContent = `${String(current+1).padStart(2,'0')} / ${String(slides.length).padStart(2,'0')}`;
      slideTitle.textContent = s.title;
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === slides.length - 1;
      [...dotsEl.children].forEach((d,i) => d.classList.toggle('active', i === current));
      const h = `#${current+1}`;
      if (location.hash !== h) history.replaceState(null,'',h);
    }
    function goTo(i) {
      const n = Math.max(0, Math.min(slides.length-1, i));
      if (n === current) return;
      current = n; render();
    }
    prevBtn.addEventListener('click', () => goTo(current-1));
    nextBtn.addEventListener('click', () => goTo(current+1));
    document.addEventListener('keydown', e => {
      if (e.target && /input|textarea|select/i.test(e.target.tagName)) return;
      if (['ArrowRight','PageDown',' '].includes(e.key)) { e.preventDefault(); goTo(current+1); }
      else if (['ArrowLeft','PageUp'].includes(e.key))    { e.preventDefault(); goTo(current-1); }
      else if (e.key === 'Home') { e.preventDefault(); goTo(0); }
      else if (e.key === 'End')  { e.preventDefault(); goTo(slides.length-1); }
    });
    addEventListener('hashchange', () => { const i = parseIndex(); if (i!==current) { current = i; render(); } });

    function fit() {
      const s = Math.min(innerWidth/1920, innerHeight/1080);
      frameHost.style.transform = `translate(-50%,-50%) scale(${s})`;
    }
    addEventListener('resize', fit); fit();

    let idleTimer;
    function bump() { document.body.classList.remove('idle'); clearTimeout(idleTimer); idleTimer = setTimeout(()=>document.body.classList.add('idle'), 2600); }
    ['mousemove','keydown','click','touchstart'].forEach(ev => addEventListener(ev, bump, {passive:true}));
    bump();

    frame.addEventListener('load', () => {
      try {
        const doc = frame.contentDocument;
        if (!doc) return;
        doc.addEventListener('keydown', e => {
          if (['ArrowRight','ArrowLeft','PageDown','PageUp',' ','Home','End'].includes(e.key))
            document.dispatchEvent(new KeyboardEvent('keydown', { key: e.key }));
        });
      } catch (_) {}
    });

    render();
  </script>
</body>
</html>
