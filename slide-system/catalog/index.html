<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SUN.STUDIO — Visual Library</title>
  <link rel="stylesheet" href="catalog.css">
</head>
<body>
  <header class="site-header">
    <a class="logo-link" href="/slide-system/catalog/" aria-label="SUN.STUDIO home">
      <img class="logo-img" src="logo.png" alt="SUN.STUDIO" height="28">
      <span class="logo-tag">Visual Library</span>
    </a>
    <nav class="top-tabs" role="tablist" aria-label="Library sections">
      <button class="top-tab is-active" data-section="components" role="tab" aria-selected="true" aria-controls="section-components">
        Components <span class="top-tab-count" id="count-components">0</span>
      </button>
      <button class="top-tab" data-section="templates" role="tab" aria-selected="false" aria-controls="section-templates">
        Templates <span class="top-tab-count" id="count-templates">0</span>
      </button>
    </nav>
  </header>

  <!-- ==================== COMPONENTS SECTION ==================== -->
  <div id="section-components" class="section-pane is-active" role="tabpanel">
    <div class="page-wrap">
      <section class="toolbar" aria-label="Component controls">
        <div class="status-tabs" role="tablist">
          <button class="status-tab is-active" data-status="published" role="tab" aria-selected="true">
            Published <span class="status-tab-count" id="count-published">0</span>
          </button>
          <button class="status-tab" data-status="staging" role="tab" aria-selected="false">
            Draft <span class="status-tab-count" id="count-draft">0</span>
          </button>
        </div>

        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="7" cy="7" r="5"/><path d="M11 11l3.5 3.5"/>
          </svg>
          <input id="search" class="search-input" type="search" placeholder="Search by name, type, intent, or tag…">
          <button class="search-clear" id="search-clear" aria-label="Clear search">&times;</button>
        </div>

        <select id="type-filter" class="filter-select" aria-label="Filter by type">
          <option value="">All types</option>
        </select>
        <select id="brand-filter" class="filter-select" aria-label="Filter by brand">
          <option value="">All brands</option>
        </select>
        <select id="compat-filter" class="filter-select" aria-label="Filter by compatibility">
          <option value="">All compatibility</option>
          <option value="html">HTML</option>
          <option value="pptx">PPTX</option>
          <option value="pdf">PDF</option>
          <option value="canva">Canva</option>
        </select>
      </section>

      <p id="summary" class="summary"></p>

      <div id="skeleton" class="skeleton-grid"></div>
      <div id="grid" class="grid" style="display:none"></div>
    </div>
  </div>

  <!-- ==================== TEMPLATES SECTION ==================== -->
  <div id="section-templates" class="section-pane" role="tabpanel" hidden>
    <div class="page-wrap">
      <div class="tpl-header">
        <div class="tpl-header-text">
          <p class="tpl-kicker" id="tpl-kicker">Loading…</p>
          <h2 class="tpl-title" id="tpl-title">Template Sets</h2>
          <p class="tpl-lede" id="tpl-lede">Published templates grouped into full deck sets.</p>
        </div>
        <nav class="jump-nav" id="jump-nav" aria-label="Switch template set" hidden></nav>
      </div>
      <main id="tpl-gallery" class="tpl-gallery" tabindex="-1">
        <div class="state-message" id="tpl-state-message" hidden></div>
      </main>
    </div>
  </div>

  <!-- ==================== COMPONENT DETAIL MODAL ==================== -->
  <div class="modal-backdrop" id="backdrop"></div>
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Item detail">
    <div class="modal-content">
      <div class="modal-header">
        <button class="modal-nav-btn" id="nav-prev" aria-label="Previous item">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8.5 3L4.5 7l4 4"/></svg>
          Prev
        </button>
        <span class="modal-title" id="modal-title"></span>
        <button class="modal-nav-btn" id="nav-next" aria-label="Next item">
          Next
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5.5 3L9.5 7l-4 4"/></svg>
        </button>
        <button class="modal-close" id="modal-close" aria-label="Close (Esc)" title="Close (Esc)">&times;</button>
      </div>

      <div class="modal-actionbar">
        <div class="modal-id" id="modal-id"></div>
        <div class="copy-actions">
          <button class="copy-btn" id="copy-id" type="button" title="Copy the component id">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="5" width="8" height="9" rx="1.5"/><path d="M11 5V3.5A1.5 1.5 0 0 0 9.5 2H4a2 2 0 0 0-2 2v6.5A1.5 1.5 0 0 0 3.5 12H5"/></svg>
            Copy ID
          </button>
          <button class="copy-btn copy-btn-primary" id="copy-prompt" type="button" title="Copy prompt">
            Copy prompt
          </button>
        </div>
      </div>

      <div class="sub-tabs-row">
        <nav class="sub-tabs" id="sub-tabs" role="tablist">
          <button class="sub-tab is-active" data-tab="preview" role="tab" aria-selected="true">Preview</button>
          <button class="sub-tab" data-tab="info" role="tab" aria-selected="false">Info</button>
          <button class="sub-tab" data-tab="compat" role="tab" aria-selected="false">Compatibility</button>
        </nav>
        <div class="modal-manage" id="modal-manage"></div>
      </div>

      <div id="panel-preview" class="tab-panel is-active">
        <div class="modal-visual" id="modal-visual"></div>
      </div>
      <div id="panel-info" class="tab-panel panel-pad"></div>
      <div id="panel-compat" class="tab-panel panel-pad"></div>

      <footer class="modal-hints" aria-hidden="true">
        <span class="hint"><kbd>Shift</kbd>+<kbd>&larr;</kbd><kbd>&rarr;</kbd> Prev / next item</span>
        <span class="hint"><kbd>&larr;</kbd><kbd>&rarr;</kbd> Carousel</span>
        <span class="hint"><kbd>+</kbd><kbd>&minus;</kbd><kbd>0</kbd> Zoom</span>
        <span class="hint"><kbd>Esc</kbd> Close</span>
      </footer>
    </div>
  </div>

  <!-- ==================== TEMPLATE VIEWER MODAL ==================== -->
  <div class="viewer-backdrop" id="tpl-modal" role="dialog" aria-modal="true" aria-labelledby="stage-name" hidden>
    <div class="viewer" role="document">
      <header class="viewer-bar">
        <div class="viewer-bar-lead">
          <button class="viewer-close" id="tpl-modal-close" type="button" aria-label="Close viewer (Escape)">
            <span aria-hidden="true">&times;</span>
          </button>
          <div class="viewer-heading">
            <p class="viewer-deck" id="viewer-deck">Deck</p>
            <p class="viewer-counter" id="viewer-counter">1 / 1</p>
          </div>
        </div>
        <button class="viewer-setbtn" id="viewer-setbtn" type="button" aria-label="Copy prompt for the whole set">Copy set prompt</button>
      </header>

      <div class="viewer-body">
        <nav class="filmstrip" id="filmstrip" aria-label="Slides in this set"></nav>

        <section class="stage">
          <div class="stage-viewport">
            <button class="stage-nav stage-prev" id="stage-prev" type="button" aria-label="Previous slide">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5 8 12l7 7"/></svg>
            </button>
            <figure class="stage-frame" id="stage-frame" aria-live="polite"></figure>
            <button class="stage-nav stage-next" id="stage-next" type="button" aria-label="Next slide">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5 16 12l-7 7"/></svg>
            </button>
          </div>

          <div class="stage-info">
            <div class="stage-info-text">
              <p class="stage-usecase" id="stage-usecase">Cover</p>
              <h2 class="stage-name" id="stage-name">Slide name</h2>
              <div class="stage-chips" id="stage-chips"></div>
              <code class="stage-id" id="stage-id">sun.deck.slide</code>
            </div>
            <div class="stage-info-side">
              <button class="select-btn" id="select-btn" type="button">Copy slide prompt</button>
              <p class="select-hint">Copies a ready-made prompt for this single slide.</p>
            </div>
          </div>
        </section>
      </div>

      <footer class="viewer-hints" aria-hidden="true">
        <span class="hint"><kbd>&larr;</kbd><kbd>&rarr;</kbd> Navigate</span>
        <span class="hint"><kbd>Home</kbd><kbd>End</kbd> First / last</span>
        <span class="hint"><kbd>Esc</kbd> Close</span>
      </footer>
    </div>
  </div>

  <div class="toast-stack" id="toast-stack" role="region" aria-label="Notifications" aria-live="polite"></div>

  <script src="catalog.js"></script>
</body>
</html>
