<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Slide Visual Library</title>
  <link rel="stylesheet" href="catalog.css">
</head>
<body>
  <header>
    <p class="eyebrow">AI Slide Generation System</p>
    <h1>Visual Library</h1>
    <p>Review published visual items and extraction staging packages.</p>
  </header>

  <main>
    <section class="toolbar" aria-label="Catalog controls">
      <div class="tabs" role="tablist">
        <button class="tab is-active" data-status="published" role="tab">Published</button>
        <button class="tab" data-status="staging" role="tab">Staging</button>
      </div>
      <input id="search" type="search" placeholder="Search ID, name, intent, tag, or source">
      <select id="type-filter" aria-label="Filter by type">
        <option value="">All types</option>
      </select>
      <select id="brand-filter" aria-label="Filter by brand">
        <option value="">All brands</option>
      </select>
      <select id="compatibility-filter" aria-label="Filter by compatibility">
        <option value="">All compatibility</option>
        <option value="html">HTML</option>
        <option value="pptx">PPTX</option>
        <option value="pdf">PDF</option>
        <option value="canva">Canva</option>
      </select>
    </section>
    <p id="summary" class="summary"></p>
    <div id="groups"></div>
  </main>

  <dialog id="detail-dialog">
    <button id="close-dialog" class="close" aria-label="Close">Close</button>
    <div id="detail"></div>
  </dialog>
  <script src="catalog.js"></script>
</body>
</html>
